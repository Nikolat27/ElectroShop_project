<!-- Cart -->
<div class="dropdown">
    <a class="dropdown-toggle" data-toggle="dropdown" aria-expanded="true">
        <i class="fa fa-shopping-cart"></i>
        <span>Your Cart</span>
        <div class="qty">3</div>
    </a>
    <div class="cart-dropdown">
        <div class="cart-list">
            {% for item in cart %}
                <div class="product-widget">
                    <div class="product-img">
                        <img src="{{ item.product.image.url }}" width="80px" height="80px" alt="">
                    </div>
                    <div class="product-body">
                        <h3 class="product-name"><a href="#">{{ item.product.title }}</a></h3>
                        <h4 class="product-price"><span class="qty">{{ item.quantity }}</span>${{ item.price }}</h4>
                    </div>
                    <form action="{% url "cart_app:delete_cart" item.unique_id %}"
                          id="delete-cart-form">
                        <button type="submit"
                                class="delete"><i
                                class="fa fa-close"></i></button>
                    </form>
                </div>
            {% empty %}
                Your cart is empty
            {% endfor %}
            hello
        </div>
        <div class="cart-summary">
            <small>3 Item(s) selected</small>
            <h5>SUBTOTAL: ${{ cart.total }}</h5>
        </div>
        <div class="cart-btns">
            <a href="{% url "cart_app:cart_list" %}">View Cart</a>
            <a href="#">Checkout <i class="fa fa-arrow-circle-right"></i></a>
        </div>
    </div>
</div>
